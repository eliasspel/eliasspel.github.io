<!DOCTYPE html>
<html lang="sv">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Laddar spel...</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
</head>
<body class="game-page">
  <header class="game-header">
    <a href="index.html" class="back-button">← Tillbaka</a>
    <h1 class="game-title" id="game-title">Laddar...</h1>
    <button class="fullscreen-button" id="fullscreen-btn" title="Fullskärm">⛶</button>
  </header>

  <main class="game-main">
    <div class="game-wrapper" id="game-wrapper">
      <div class="game-loader" id="game-loader">
        <div class="spinner"></div>
        <p>Laddar spelet...</p>
      </div>
      <iframe id="game-iframe" class="game-iframe" allowfullscreen></iframe>
    </div>

    <div class="game-info" id="game-info">
      <p class="game-description" id="game-description"></p>
      <span class="game-category-badge" id="game-category"></span>
    </div>

    <section class="more-games" id="more-games-section">
      <h2 class="section-title">🎮 Fler spel</h2>
      <div class="games-grid small" id="more-games-grid"></div>
    </section>
  </main>

  <footer class="footer">
    <p>Skapat av <strong>Elia</strong> &mdash; Elias Spelportal &copy; 2026</p>
  </footer>

  <script src="js/app.js"></script>
</body>
</html>
