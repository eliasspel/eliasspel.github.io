<!DOCTYPE html>
<html lang="sv">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Goal Master</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #042f2e; color: #fff; font-family: 'Segoe UI', sans-serif; display: flex; align-items: center; justify-content: center; min-height: 100vh; text-align: center; }
    .container { padding: 40px; }
    h1 { font-size: 48px; margin-bottom: 16px; }
    p { font-size: 18px; color: #2dd4bf; margin-bottom: 24px; }
    .emoji { font-size: 96px; margin-bottom: 24px; display: block; animation: kick 1s ease-in-out infinite; }
    .hint { font-size: 14px; color: #64748b; }
    @keyframes kick { 0%, 100% { transform: rotate(0deg); } 25% { transform: rotate(-15deg); } 75% { transform: rotate(15deg); } }
  </style>
</head>
<body>
  <div class="container">
    <span class="emoji">⚽</span>
    <h1>Goal Master</h1>
    <p>Sikta och skjut! Bli den ultimata målgöraren!</p>
    <p class="hint">Platshållare — ersätt med ditt riktiga spel!</p>
  </div>
</body>
</html>
