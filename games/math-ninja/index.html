<!DOCTYPE html>
<html lang="sv">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Math Ninja</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #422006; color: #fff; font-family: 'Segoe UI', sans-serif; display: flex; align-items: center; justify-content: center; min-height: 100vh; text-align: center; }
    .container { padding: 40px; }
    h1 { font-size: 48px; margin-bottom: 16px; }
    p { font-size: 18px; color: #fbbf24; margin-bottom: 24px; }
    .emoji { font-size: 96px; margin-bottom: 24px; display: block; animation: slice 0.6s ease-in-out infinite alternate; }
    .hint { font-size: 14px; color: #64748b; }
    @keyframes slice { 0% { transform: translateX(-10px) rotate(-5deg); } 100% { transform: translateX(10px) rotate(5deg); } }
  </style>
</head>
<body>
  <div class="container">
    <span class="emoji">🥷</span>
    <h1>Math Ninja</h1>
    <p>Lös matteuppgifter snabbt som en ninja!</p>
    <p class="hint">Platshållare — ersätt med ditt riktiga spel!</p>
  </div>
</body>
</html>
