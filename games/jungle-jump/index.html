<!DOCTYPE html>
<html lang="sv">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Jungle Jump</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #052e16; color: #fff; font-family: 'Segoe UI', sans-serif; display: flex; align-items: center; justify-content: center; min-height: 100vh; text-align: center; }
    .container { padding: 40px; }
    h1 { font-size: 48px; margin-bottom: 16px; }
    p { font-size: 18px; color: #4ade80; margin-bottom: 24px; }
    .emoji { font-size: 96px; margin-bottom: 24px; display: block; animation: jump 0.8s ease-in-out infinite; }
    .hint { font-size: 14px; color: #64748b; }
    @keyframes jump { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-30px); } }
  </style>
</head>
<body>
  <div class="container">
    <span class="emoji">🐒</span>
    <h1>Jungle Jump</h1>
    <p>Hoppa genom djungeln och samla frukter!</p>
    <p class="hint">Platshållare — ersätt med ditt riktiga spel!</p>
  </div>
</body>
</html>
