<!DOCTYPE html>
<html lang="sv">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Puzzle Blocks</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #1a0533; color: #fff; font-family: 'Segoe UI', sans-serif; display: flex; align-items: center; justify-content: center; min-height: 100vh; text-align: center; }
    .container { padding: 40px; }
    h1 { font-size: 48px; margin-bottom: 16px; }
    p { font-size: 18px; color: #c084fc; margin-bottom: 24px; }
    .emoji { font-size: 96px; margin-bottom: 24px; display: block; animation: spin 3s linear infinite; }
    .hint { font-size: 14px; color: #64748b; }
    @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div class="container">
    <span class="emoji">🧩</span>
    <h1>Puzzle Blocks</h1>
    <p>Passa ihop blocken och rensa rader!</p>
    <p class="hint">Platshållare — ersätt med ditt riktiga spel!</p>
  </div>
</body>
</html>
