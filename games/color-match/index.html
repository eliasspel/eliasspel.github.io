<!DOCTYPE html>
<html lang="sv">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Color Match</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #1e1b4b; color: #fff; font-family: 'Segoe UI', sans-serif; display: flex; align-items: center; justify-content: center; min-height: 100vh; text-align: center; }
    .container { padding: 40px; }
    h1 { font-size: 48px; margin-bottom: 16px; }
    p { font-size: 18px; color: #818cf8; margin-bottom: 24px; }
    .emoji { font-size: 96px; margin-bottom: 24px; display: block; animation: pulse 1.5s ease-in-out infinite; }
    .hint { font-size: 14px; color: #64748b; }
    @keyframes pulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.15); } }
  </style>
</head>
<body>
  <div class="container">
    <span class="emoji">🎨</span>
    <h1>Color Match</h1>
    <p>Matcha rätt färg innan tiden rinner ut!</p>
    <p class="hint">Platshållare — ersätt med ditt riktiga spel!</p>
  </div>
</body>
</html>
